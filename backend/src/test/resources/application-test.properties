# ── Profil TEST ───────────────────────────────────────────────────────────────
# Active automatiquement par @DataJpaTest et @SpringBootTest quand le profil
# "test" est selectionne, ou via @ActiveProfiles("test").
#
# Pour TaskControllerIT (@SpringBootTest sans profil explicite),
# ces proprietes sont chargees grace au fichier place dans src/test/resources/.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# PAS de data.sql en test : les donnees sont injectees par @BeforeEach
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# H2 Console desactivee en test
spring.h2.console.enabled=false

logging.level.org.springframework=WARN
logging.level.com.example=DEBUG
