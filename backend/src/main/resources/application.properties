# ── Serveur ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de données (H2 en mémoire — profil dev) ──────────────────────────────
spring.datasource.url=jdbc:h2:mem:taskmanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# "update" crée les tables si absentes, les met à jour sans les supprimer
# Plus sûr que create-drop pour le dev (données conservées entre restart)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# ── Initialisation SQL ────────────────────────────────────────────────────────
# CORRECTION Spring Boot 3 + Hibernate 6 :
# Sans defer=true, data.sql s'execute AVANT que Hibernate cree les tables -> erreur "Table not found"
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── H2 Console (dev uniquement) ───────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.com.example.taskmanager=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
